<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>AI Pulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Devanagari:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #05070a;
        --card-bg: #0f1219;
        --card-hover: #161b22;
        --text: #ffffff;
        --text-muted: #94a3b8;
        --primary: #38bdf8;
        --primary-glow: rgba(56, 189, 248, 0.4);
        --accent: #fbbf24;
        --border: rgba(255, 255, 255, 0.1);
        --success: #00f281;
        --error: #ff4d4d;
        --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        --calendar-filter: invert(100%) brightness(1.5);
        
        /* Standardized Spacing & Sizes */
        --space-xs: 8px;
        --space-sm: 14px;
        --space-md: 24px;
        --space-lg: 36px;
        --touch-target: 48px;
        --safe-top: env(safe-area-inset-top, 20px);
        --nav-height: calc(var(--safe-top) + 64px);

        /* Fluid Typography */
        --font-size-h1: clamp(1.4rem, 1.1rem + 1.5vw, 2.2rem);
        --font-size-h2: clamp(1.2rem, 1rem + 1vw, 1.8rem);
        --font-size-logo: clamp(1.2rem, 1.1rem + 0.5vw, 1.5rem);
        --font-size-base: clamp(0.9rem, 0.85rem + 0.25vw, 1.1rem);
      }

      [data-theme="light"] {
        color-scheme: light;
        --bg: #fdfdfd;
        --card-bg: #ffffff;
        --card-hover: #f8fafc;
        --text: #0f172a;
        --text-muted: #64748b;
        --primary: #0284c7;
        --primary-glow: rgba(2, 132, 199, 0.2);
        --accent: #d97706;
        --border: rgba(0, 0, 0, 0.05);
        --shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        --calendar-filter: none;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      
      html {
        background-color: var(--bg);
        scrollbar-width: none;
      }

      body {
        font-family: "Inter", "Noto Sans Devanagari", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        line-height: 1.6;
        font-size: var(--font-size-base);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      nav {
        background: var(--bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        position: fixed;
        top: 0;
        z-index: 2000;
        width: 100%;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
      }
      .status-bar-spacer {
        /* Use native safe area but pull everything up by 15px to close the gap */
        height: env(safe-area-inset-top, 20px);
        margin-top: -15px;
        width: 100%;
        background: var(--bg);
      }
      .nav-inner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: var(--space-sm);
        padding: 0 var(--space-md);
        width: 100%;
        max-width: 1400px;
        margin: 0 auto;
        height: 56px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: var(--space-sm);
        overflow: hidden;
      }
      .logo {
        font-size: var(--font-size-logo);
        font-weight: 900;
        color: var(--primary);
        text-decoration: none;
        display: flex;
        align-items: center;
        letter-spacing: -0.05em;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .logo span {
        color: var(--text);
        font-weight: 800;
      }

      .nav-actions {
        display: flex;
        gap: var(--space-xs);
        align-items: center;
        flex-shrink: 0;
      }
      .btn-icon {
        background: var(--card-bg);
        border: 1px solid var(--border);
        color: var(--text);
        width: 24px;
        height: 24px;
        border-radius: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
        font-size: 0.75rem;
      }
      .btn-icon:active {
        transform: scale(0.9);
        background: var(--card-hover);
      }

      /* Make the language toggle expand to fit its text */
      #lang-btn {
        width: auto;
        min-width: 32px;
        padding: 0 6px;
        height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }
      #feed-container {
        height: 100vh;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        position: relative;
        padding-top: 0;
      }
      #feed-container::-webkit-scrollbar {
        display: none;
      }

      .feed-item {
        height: 100vh;
        width: 100%;
        scroll-snap-align: start;
        scroll-snap-stop: always;
        position: relative;
        overflow: hidden;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        padding-top: 100px; /* ensure content doesn't collide with header */
      }

      .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        max-height: 80vh;
        transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        transform-style: preserve-3d;
        border-radius: 36px;
      }

      .feed-item.flipped .card-inner {
        transform: rotateY(180deg);
      }

      .card-front, .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        border-radius: 36px;
        overflow: hidden;
        background: var(--card-bg);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        /* Force hardware acceleration and layer separation for iOS */
        -webkit-transform: translate3d(0,0,0);
        transform: translate3d(0,0,0);
      }

      .card-front {
        z-index: 2;
        transform: rotateY(0deg);
      }

      .card-back {
        z-index: 1;
        transform: rotateY(180deg);
        padding: var(--space-md);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }

      .card-image-wrap {
        position: relative;
        width: 100%;
        height: 33%;
        overflow: hidden;
        background: var(--border);
        /* Ensure image wrap also respects backface-visibility on Safari */
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
      }

      /* ensure a solid backdrop for any transparent images (SVGs/PNGs) */
      .card-image-wrap::before {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--card-bg);
        z-index: 1;
      }

      .card-image-bg {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        transition: transform 1.5s ease-out;
        background-color: transparent;
        /* Force backface hiding on image itself for iOS */
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
      }
      
      .feed-item.active .card-image-bg:not(.logo) {
        transform: scale(1.1);
      }

      .card-image-bg.logo {
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        transform: none;
        background-color: var(--card-bg); /* follow theme background for logos */
      }

      .card-content-front {
        padding: var(--space-md);
        display: flex;
        flex-direction: column;
        height: 69%;
        background: var(--card-bg);
      }

      .card-category {
        display: inline-block;
        align-self: flex-start;
        padding: 3px 8px;
        background: var(--primary);
        color: #000;
        font-size: 0.55rem;
        font-weight: 800;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 10px;
      }

      .card-headline {
        font-size: var(--font-size-h2);
        font-weight: 800;
        line-height: 1.5;
        margin: 0 0 var(--space-sm) 0;
        color: var(--text);
        letter-spacing: -0.02em;
        display: block;
        /* allow the headline to take available space and scroll when long */
        flex: 1 1 auto;
        max-height: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-right: 8px;
        word-wrap: break-word;
        white-space: normal;
        text-overflow: clip;
      }

      .card-meta {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding-top: var(--space-sm);
        border-top: 1px solid var(--border);
        min-height: 90px;
      }

      .card-meta-left {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.85rem;
        color: var(--text-muted);
        font-weight: 600;
        flex-shrink: 0;
      }

      .card-source-tag {
        position: absolute;
        top: 14px;
        left: 14px;
        z-index: 3;
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 5px 10px;
        border-radius: 6px;
        color: #fff;
        border: 1px solid rgba(255,255,255,0.1);
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      
      .btn-source-icon {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 4;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #fff;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        text-decoration: none;
        transition: var(--transition);
      }
      .btn-source-icon:active { transform: scale(0.9); }

      /* Skeleton Styles */
      .skeleton .card-image-wrap { background: var(--border); opacity: 0.5; }
      .skeleton .card-content-front { background: var(--card-bg); }
      .skeleton .card-headline { height: 1.5rem; background: var(--border); border-radius: 4px; width: 80%; margin-bottom: 8px; }
      .skeleton .card-category { width: 60px; height: 1rem; background: var(--border); border-radius: 4px; }


      .card-back-title {
        font-size: 1.2rem;
        font-weight: 800;
        margin-bottom: 20px;
        color: var(--primary);
        line-height: 1.3;
      }

      .card-back-bullets {
        margin: 0 0 24px 0;
        padding: 0;
        list-style: none;
        width: 100%;
      }

      .card-back-bullets li {
        margin-bottom: 14px;
        font-size: 0.95rem;
        line-height: 1.5;
        position: relative;
        padding-left: 20px;
        color: var(--text);
      }

      .card-back-bullets li::before {
        content: "•";
        color: var(--primary);
        position: absolute;
        left: 0;
        font-size: 1.1rem;
        top: -1px;
      }

      .btn-action {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        border: none;
        background: var(--primary);
        color: #000;
        font-weight: 800;
        font-size: 0.9rem;
        cursor: pointer;
        transition: var(--transition);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        box-shadow: 0 6px 20px var(--primary-glow);
      }
      .btn-action:active { transform: scale(0.98); }

      .btn-secondary {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-muted);
        border-radius: 12px;
        font-weight: 700;
        font-size: 0.85rem;
        cursor: pointer;
        transition: var(--transition);
      }
      .btn-secondary:active { background: var(--border); }

      #pull-indicator {
        position: absolute;
        top: calc(var(--nav-height) + 20px);
        left: 0;
        right: 0;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        z-index: 1500;
        transition: transform 0.1s linear, opacity 0.2s;
        pointer-events: none;
        color: var(--primary);
        opacity: 0;
      }

      /* Bottom Sheet Filter Redesign */
      #filters-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(10px);
        z-index: 3000;
        display: none;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      #filters-overlay.active {
        display: block;
        opacity: 1;
      }
      .bottom-sheet {
        position: fixed;
        bottom: -100%;
        left: 0;
        right: 0;
        background: var(--card-bg);
        border-radius: 40px 40px 0 0;
        padding: 20px var(--space-md) calc(var(--space-md) + env(safe-area-inset-bottom, 20px)) var(--space-md);
        box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
        transition: bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 3001;
        max-height: 85vh;
        overflow-y: auto;
      }
      #filters-overlay.active .bottom-sheet {
        bottom: 0;
      }
      .sheet-handle {
        width: 36px;
        height: 5px;
        background: var(--border);
        border-radius: 10px;
        margin: 0 auto 24px auto;
      }

      .feed-type-toggle {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
        background: var(--bg);
        padding: 4px;
        border-radius: 12px;
        border: 1px solid var(--border);
      }
      .feed-type-btn {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: transparent;
        color: var(--text-muted);
        font-weight: 700;
        font-size: 0.85rem;
        cursor: pointer;
        transition: var(--transition);
      }
      .feed-type-btn.active {
        background: var(--card-bg);
        color: var(--primary);
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      .filter-group {
        margin-bottom: 20px;
      }
      .filter-label {
        display: block;
        font-size: 0.75rem;
        font-weight: 800;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 8px;
        letter-spacing: 0.05em;
      }
      .search-input, .filter-select, .filter-date {
        width: 100%;
        padding: 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        font-size: 0.95rem;
        font-weight: 600;
        outline: none;
        transition: var(--transition);
        font-family: inherit;
      }
      .search-input:focus, .filter-select:focus, .filter-date:focus {
        border-color: var(--primary);
        background: var(--card-bg);
      }

      .btn-toggle {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 14px;
        padding: 12px;
        font-family: inherit;
        font-weight: 700;
        font-size: 0.95rem;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        gap: 10px;
      }
      .btn-toggle.active {
        background: var(--primary);
        color: #000;
        border-color: var(--primary);
      }

      .badge {
        background: var(--border);
        color: var(--text-muted);
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 0.55rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
      }

      .feed-item.high-impact .card-inner {
        border: 2px solid #ff4d4d;
        box-shadow: 0 0 20px rgba(255, 77, 77, 0.3);
      }

      @media (max-width: 480px) {
        /* Fluid typography handles logo and headline scaling via clamp() */
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="status-bar-spacer"></div>
      <div class="nav-inner">
        <div class="brand">
          <div style="display: flex; flex-direction: column; align-items: flex-start; justify-content: center;">
            <a href="/" class="logo">AI<span>Pulse</span></a>
            <span id="header-date" style="font-size: 0.55rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.05em; margin-top: -2px;"></span>
          </div>
        </div>
        <div class="nav-actions">
          <button onclick="toggleLang()" class="btn-icon" id="lang-btn">हिन्दी</button>
          <button onclick="toggleFilters(true)" class="btn-icon">⚙️</button>
          <button onclick="toggleTheme()" class="btn-icon">🌓</button>
        </div>
      </div>
    </nav>

    <div id="pull-indicator">↓</div>

    <div id="feed-container">
      <div id="cards-stack">
          <!-- Skeletons -->
          <div class="feed-item skeleton"><div class="card-inner" style="background:var(--border); opacity:0.3;"></div></div>
      </div>
      <div id="infinite-scroll-trigger" style="height: 100px; width: 100%; background: transparent;"></div>
    </div>

    <!-- Redesigned Filter Bottom Sheet -->
    <div id="filters-overlay" onclick="toggleFilters(false)">
      <div class="bottom-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <h2 style="margin: 0 0 20px 0; font-size: 1.3rem; font-weight: 800;">Preferences</h2>
        
        <div class="feed-type-toggle">
          <button id="btn-type-news" class="feed-type-btn active" onclick="setFeedType('news')">General</button>
          <button id="btn-type-official" class="feed-type-btn" onclick="setFeedType('official')">Official</button>
        </div>

        <div class="filter-group">
          <label class="filter-label">Search</label>
          <input type="text" id="search-q" class="search-input" placeholder="Keywords..." onkeypress="if(event.key==='Enter') resetAndFetch()" />
        </div>

        <div class="filter-group">
          <label class="filter-label" id="label-src">Source Portal</label>
          <select id="sel-src" class="filter-select" onchange="resetAndFetch()">
            <option value="">All Portals</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label" id="label-cat">Category</label>
          <select id="sel-cat" class="filter-select" onchange="resetAndFetch()">
            <option value="">All Categories</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label" id="label-audience">Who are you?</label>
          <select id="sel-audience" class="filter-select" onchange="resetAndFetch()">
            <option value="">Who are you?</option>
          </select>
        </div>

        <div class="filter-group">
          <button id="btn-high-impact" class="btn-toggle" onclick="toggleHighImpact()">
            <span id="label-high-impact">High Impact Only</span> 🚨
          </button>
        </div>

        <div class="filter-group">
          <label class="filter-label">Filter by Date</label>
          <input type="date" id="filter-date" class="filter-date" onchange="resetAndFetch()" />
        </div>

        <button class="btn-action" onclick="toggleFilters(false)">Done</button>
      </div>
    </div>

    <div id="toast" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); padding:12px 24px; border-radius:50px; background:var(--primary); color:#fff; display:none; z-index:4000; font-weight:700;"></div>

    <script src="capacitor.js"></script>
    <script>
      const API_BASE = "https://aipulse-daily.vercel.app";
      const API = `${API_BASE}/api/v1`;

      const LOGO_EXT = {
        egazette_central: "svg", 
        et_top_stories: "png", 
        ibbi_updates: "png",
        income_tax: "png", 
        irdai_updates: "webp", 
        mca_updates: "png",
        meity_updates: "svg", 
        mha_updates: "svg", 
        mint_top_stories: "png",
        pib_press_releases: "jpg", 
        rbi_circulars: "png", 
        rbi_press_releases: "png",
        sebi_news: "jpg", 
        bs_top_stories: "png"
      };

      let CATEGORIES = [
        { id: "jobs", en: "Jobs", hi: "नौकरियां" },
        { id: "schemes", en: "Schemes", hi: "योजनाएं" },
        { id: "tax", en: "Tax", hi: "कर (Tax)" },
        { id: "agriculture", en: "Agriculture", hi: "कृषि" },
        { id: "education", en: "Education", hi: "शिक्षा" },
        { id: "health", en: "Health", hi: "स्वास्थ्य" },
        { id: "legal", en: "Legal", hi: "कानूनी" },
        { id: "gazette", en: "Gazette", hi: "राजपत्र" },
        { id: "finance", en: "Finance", hi: "वित्त" },
        { id: "infrastructure", en: "Infrastructure", hi: "बुनियादी ढांचा" },
        { id: "environment", en: "Environment", hi: "पर्यावरण" },
        { id: "defense", en: "Defense", hi: "रक्षा" },
        { id: "technology", en: "Technology", hi: "प्रौद्योगिकी" },
        { id: "local_governance", en: "Local Governance", hi: "स्थानीय शासन" },
        { id: "women_child", en: "Women & Child", hi: "महिला एवं बाल" },
        { id: "social_welfare", en: "Social Welfare", hi: "समाज कल्याण" },
        { id: "other", en: "Other", hi: "अन्य" }
      ];

      let AUDIENCES = [
        "Retail Investors", "Farmers", "MSMEs", "Students", "Corporate Legal", 
        "Tax Professionals", "Chartered Accountants", "Bankers", "Insurance Professionals", 
        "Insolvency Professionals", "Fintech Entities", "Healthcare Providers", "Exporters", 
        "Tech Professionals"
      ];

      const SEEN_DB_NAME = "AIPulseSeenDB";
      const SEEN_STORE_NAME = "seen_articles";

      const SeenManager = {
        db: null,
        ids: new Set(),

        async init() {
          return new Promise((resolve) => {
            const request = indexedDB.open(SEEN_DB_NAME, 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore(SEEN_STORE_NAME);
            request.onsuccess = (e) => {
              this.db = e.target.result;
              const tx = this.db.transaction(SEEN_STORE_NAME, "readwrite");
              const store = tx.objectStore(SEEN_STORE_NAME);
              const results = [];
              const req = store.openCursor();
              
              req.onsuccess = (event) => {
                const cursor = event.target.result;
                if (cursor) {
                  results.push({ id: String(cursor.key), ts: cursor.value });
                  cursor.continue();
                } else {
                  if (results.length > 5000) {
                    results.sort((a, b) => (Number(a.ts) || 0) - (Number(b.ts) || 0));
                    const toDelete = results.slice(0, results.length - 4000);
                    const delTx = this.db.transaction(SEEN_STORE_NAME, "readwrite");
                    const delStore = delTx.objectStore(SEEN_STORE_NAME);
                    toDelete.forEach(item => delStore.delete(item.id));
                    this.ids = new Set(results.slice(results.length - 4000).map(r => r.id));
                  } else {
                    this.ids = new Set(results.map(r => r.id));
                  }
                  resolve();
                }
              };
            };
            request.onerror = () => resolve();
          });
        },

        has(id) {
          return this.ids.has(String(id));
        },

        async add(id) {
          const strId = String(id);
          if (this.has(strId)) return;
          this.ids.add(strId);
          if (!this.db) return;
          try {
            const tx = this.db.transaction(SEEN_STORE_NAME, "readwrite");
            tx.objectStore(SEEN_STORE_NAME).put(Date.now(), strId);
          } catch (e) {}
        }
      };

      let cachedItemIDs = new Set();
      let currentPage = 1;
      let isLoading = false;
      let endReached = false;
      let isHighImpactOnly = false;

      const haptic = async (type = "impactHeavy") => {
        if (window.Capacitor?.Plugins?.Haptics) {
          try {
            if (type === "impactHeavy") await window.Capacitor.Plugins.Haptics.impact({ style: "HEAVY" });
            if (type === "impactMedium") await window.Capacitor.Plugins.Haptics.impact({ style: "MEDIUM" });
            if (type === "impactLight") await window.Capacitor.Plugins.Haptics.impact({ style: "LIGHT" });
            if (type === "notificationSuccess") await window.Capacitor.Plugins.Haptics.notification({ type: "SUCCESS" });
          } catch (e) {}
        }
      };

      let currentLang = localStorage.getItem("gov_lang") || "en";
      let ALL_SOURCES = [];
      let feedType = "news";
      let observer;
      let infiniteObserver;

      const I18N = {
        en: { 
          details: "Breakdown", 
          source: "Official Source", 
          back: "Close", 
          noSummary: "No summary available.", 
          allCats: "All Categories", 
          allPortals: "All Portals",
          whoAreYou: "Who are you?",
          highImpactOnly: "High Impact Only"
        },
        hi: { 
          details: "सारांश", 
          source: "आधिकारिक स्रोत", 
          back: "बंद करें", 
          noSummary: "सारांश उपलब्ध नहीं है।", 
          allCats: "सभी श्रेणियां", 
          allPortals: "सभी पोर्टल",
          whoAreYou: "आप कौन हैं?",
          highImpactOnly: "केवल उच्च प्रभाव"
        }
      };

      async function fetchMetadata() {
        try {
          const res = await fetch(`${API}/config/metadata`);
          if (!res.ok) throw new Error("Metadata fetch failed");
          const data = await res.json();
          if (data.audiences && data.audiences.length > 0) AUDIENCES = data.audiences;
          if (data.categories && data.categories.length > 0) CATEGORIES = data.categories;
        } catch (e) { console.error("fetchMetadata failed", e); }
      }

      async function init() {
        updateDate();
        await SeenManager.init();
        setTheme(localStorage.getItem("gov_theme") || "dark");
        
        try {
          await fetchMetadata();
          const res = await fetch(`${API}/config/sources`);
          const d = await res.json();
          ALL_SOURCES = d || [];
        } catch (e) {}

        setLang(currentLang);
        
        observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const id = entry.target.id.replace('item-', '');
              SeenManager.add(id);
              entry.target.classList.add('active');
              haptic("impactLight");
            } else {
              entry.target.classList.remove('active');
            }
          });
        }, { threshold: 0.6 });

        infiniteObserver = new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting && !isLoading && !endReached) {
            fetchFeed(false, true);
          }
        }, { threshold: 0.1 });

        const trigger = document.getElementById("infinite-scroll-trigger");
        if (trigger) infiniteObserver.observe(trigger);

        initPullToRefresh();
        fetchFeed();
      }

      function timeAgo(date) {
        if (!date) return "";
        const seconds = Math.floor((new Date() - new Date(date)) / 1000);
        let interval = seconds / 31536000;
        if (interval > 1) return Math.floor(interval) + "y ago";
        interval = seconds / 2592000;
        if (interval > 1) return Math.floor(interval) + "mo ago";
        interval = seconds / 86400;
        if (interval > 1) return Math.floor(interval) + "d ago";
        interval = seconds / 3600;
        if (interval > 1) return Math.floor(interval) + "h ago";
        interval = seconds / 60;
        if (interval > 1) return Math.floor(interval) + "m ago";
        return "just now";
      }

      function updateDate() {
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        const el = document.getElementById("header-date");
        if (el) el.textContent = new Date().toLocaleDateString('en-US', options);
      }

      function setTheme(t) {
        document.documentElement.setAttribute("data-theme", t);
        localStorage.setItem("gov_theme", t);
      }
      function toggleTheme() { setTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"); }

      function setLang(l) {
        currentLang = l;
        localStorage.setItem("gov_lang", l);
        const btn = document.getElementById("lang-btn");
        if (btn) btn.textContent = l === "en" ? "हिन्दी" : "English";
        
        const selCat = document.getElementById("sel-cat");
        if (selCat) {
          const curVal = selCat.value;
          selCat.innerHTML = `<option value="">${I18N[l].allCats}</option>` + 
            CATEGORIES.map(c => `<option value="${c.id}">${c[l]}</option>`).join("");
          selCat.value = curVal;
        }

        const selAud = document.getElementById("sel-audience");
        if (selAud) {
          const curVal = selAud.value;
          selAud.innerHTML = `<option value="">${I18N[l].whoAreYou}</option>` + 
            AUDIENCES.map(aud => `<option value="${aud}">${aud}</option>`).join("");
          selAud.value = curVal;
          const labelAud = document.getElementById("label-audience");
          if (labelAud) labelAud.textContent = I18N[l].whoAreYou;
        }

        const labelHighImpact = document.getElementById("label-high-impact");
        if (labelHighImpact) labelHighImpact.textContent = I18N[l].highImpactOnly;

        renderSourceFilters();
      }
      function toggleLang() { setLang(currentLang === "en" ? "hi" : "en"); resetAndFetch(); }

      function toggleFilters(show) {
        const overlay = document.getElementById("filters-overlay");
        if (!overlay) return;
        if (show) {
          overlay.style.display = "block";
          setTimeout(() => overlay.classList.add("active"), 10);
        } else {
          overlay.classList.remove("active");
          setTimeout(() => overlay.style.display = "none", 300);
        }
        haptic("impactLight");
      }

      function setFeedType(type) {
        feedType = type;
        const btnNews = document.getElementById("btn-type-news");
        const btnOfficial = document.getElementById("btn-type-official");
        if(btnNews) btnNews.classList.toggle("active", type === "news");
        if(btnOfficial) btnOfficial.classList.toggle("active", type === "official");
        renderSourceFilters();
        resetAndFetch();
      }

      function toggleHighImpact() {
        isHighImpactOnly = !isHighImpactOnly;
        document.getElementById("btn-high-impact").classList.toggle("active", isHighImpactOnly);
        resetAndFetch();
      }

      function renderSourceFilters() {
        const sel = document.getElementById("sel-src");
        if (!sel) return;
        const filtered = ALL_SOURCES.filter(s => {
          const isNews = s.id.includes('top_stories');
          return feedType === "news" ? isNews : !isNews;
        });
        sel.innerHTML = `<option value="">${I18N[currentLang].allPortals}</option>` + 
          filtered.map(s => `<option value="${s.id}">${s.name}</option>`).join("");
      }

      function showToast(msg, duration = 3000) {
        const t = document.getElementById("toast");
        if (!t) return;
        t.textContent = msg;
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", duration);
      }

      async function fetchFeed(forceRefresh = false, isLoadMore = false) {
        if (isLoading) return;
        isLoading = true;
        
        const isInitial = forceRefresh || (!isLoadMore && currentPage === 1);
        if (forceRefresh) { 
          currentPage = 1; 
          endReached = false; 
          cachedItemIDs.clear();
        }
        
        const container = document.getElementById("cards-stack");
        if (!isLoadMore && cachedItemIDs.size === 0) {
            container.innerHTML = `<div class="feed-item skeleton"><div class="card-inner" style="background:var(--border); opacity:0.3;"></div></div>`;
        }
        
        const qEl = document.getElementById("search-q");
        const q = qEl ? qEl.value : "";
        const src = document.getElementById("sel-src").value;
        const cat = document.getElementById("sel-cat").value;
        const aud = document.getElementById("sel-audience").value;
        const date = document.getElementById("filter-date").value;
        
        const pageSize = 15;
        const getUrl = (p) => {
          let url = `${API}/feed/latest?page=${p}&page_size=${pageSize}&feed_type=${feedType}`;
          if (q) url = `${API}/feed/search?q=${encodeURIComponent(q)}&page=${p}&page_size=${pageSize}&feed_type=${feedType}`;
          if (src) url += `&source_id=${src}`;
          if (cat) url += `&category=${cat}`;
          if (aud) url += `&audience=${encodeURIComponent(aud)}`;
          if (date) url += `&date=${date}`;
          if (isHighImpactOnly) url += `&impact_level=high_only`;
          return url;
        };

        try {
          const cache = await caches.open("aipulse-cache");
          
          if (isInitial && !q && !forceRefresh) {
            const cachedResponse = await cache.match(getUrl(1));
            if (cachedResponse) {
              const cachedData = await cachedResponse.json();
              const items = (cachedData.items || []).filter(item => !SeenManager.has(item.id));
              if (items.length > 0) {
                items.forEach(item => cachedItemIDs.add(String(item.id)));
                renderFeed(items, false);
              }
            }
          }

          let accumulatedItems = [];
          let unseenCount = 0;
          let pagesProbed = 0;
          const maxProbes = isInitial ? 5 : 1;

          while (pagesProbed < maxProbes && !endReached) {
            const res = await fetch(getUrl(currentPage));
            if (!res.ok) {
              if (res.status === 429) showToast("Too many requests. Please wait a moment.");
              else if (res.status >= 500) showToast("Server error. Please try again later.");
              break;
            }
            
            const data = await res.json();
            const networkItems = data.items || [];
            if (networkItems.length < pageSize) endReached = true;
            
            const filteredBatch = networkItems.filter(item => !SeenManager.has(item.id));
            accumulatedItems.push(...filteredBatch);
            unseenCount += filteredBatch.length;
            
            if (unseenCount >= 10 || endReached || q) {
              break;
            }
            
            currentPage++;
            pagesProbed++;
          }

          if (accumulatedItems.length > 0) {
            if (isInitial) {
                accumulatedItems.sort((a, b) => {
                    const idA = String(a.id);
                    const idB = String(b.id);
                    const isNewA = !cachedItemIDs.has(idA);
                    const isNewB = !cachedItemIDs.has(idB);

                    if (isNewA && !isNewB) return -1;
                    if (!isNewA && isNewB) return 1;
                    return new Date(b.published_at || b.created_at) - new Date(a.published_at || a.created_at);
                });
                if (!q) {
                  const cacheData = { items: accumulatedItems.slice(0, pageSize), total: accumulatedItems.length, page: 1, page_size: pageSize };
                  cache.put(getUrl(1), new Response(JSON.stringify(cacheData)));
                }
            }

            let shouldAppend = isLoadMore;
            if (isInitial && cachedItemIDs.size > 0) {
                shouldAppend = true;
                accumulatedItems = accumulatedItems.filter(item => !cachedItemIDs.has(String(item.id)));
            }

            if (accumulatedItems.length > 0) {
                accumulatedItems.forEach(item => cachedItemIDs.add(String(item.id)));
                renderFeed(accumulatedItems, shouldAppend);
            }
            currentPage++;
          } else if (isInitial && cachedItemIDs.size === 0) {
            container.innerHTML = `<p style="text-align:center; padding:100px; opacity:0.5;">${endReached ? 'You are all caught up!' : 'No new items found. Try again later.'}</p>`;
          }
        } catch (e) { 
          console.error("Fetch failed", e);
          showToast("Network error. Check your connection.");
        }
        finally { isLoading = false; }
      }

      function renderFeed(items, append = false) {
        const container = document.getElementById("cards-stack");
        if (!items.length && !append) { container.innerHTML = "<p style='text-align:center; padding:100px; opacity:0.5;'>No records found.</p>"; return; }

        const html = items.map((item) => {
            const { oneLiner, bullets } = parseSummary(item.summary, currentLang);
            const isHighImpact = item.impact_level === "high" || item.impact_level === "critical";
            
            let imageUrl = item.image_url;
            if (imageUrl && imageUrl.startsWith('/static/logos/')) {
                const filename = imageUrl.split('/').pop();
                imageUrl = `assets/logos/${filename}`;
            } else if (imageUrl && imageUrl.startsWith('/')) {
                imageUrl = API_BASE + imageUrl;
            }

            if (!imageUrl) {
                const ext = LOGO_EXT[item.source_id] || "png";
                imageUrl = `assets/logos/${item.source_id}.${ext}`;
            }
            const finalImage = imageUrl || "https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&q=80&w=1000";
            const isLogo = finalImage && (finalImage.startsWith('assets/logos/') || finalImage.includes('/logos/'));
            const imageStyle = `background-image: url('${finalImage}'); background-size: contain; background-position: center; background-repeat: no-repeat; background-color: var(--card-bg);`;
            const imageClass = isLogo ? 'card-image-bg logo' : 'card-image-bg';

            const cat = CATEGORIES.find(c => c.id === item.category);
            const isGeneral = !cat || cat.id === 'other';
            const catLabel = cat ? cat[currentLang] : (currentLang === "en" ? "General" : "सामान्य");
            const timeStr = timeAgo(item.published_at || item.created_at);

            return `
                <div class="feed-item ${isHighImpact ? 'high-impact' : ''}" id="item-${item.id}" onclick="toggleFlip('${item.id}')">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="card-image-wrap">
                                <div class="${imageClass}" style="${imageStyle}" onerror="this.style.backgroundImage='url(https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&q=80&w=1000)'"></div>
                                <div class="card-overlay"></div>
                                <div class="card-source-tag">
                                    <span class="source-name-mini">${(item.source_name || item.source_id).toUpperCase()}</span>
                                </div>
                            </div>
                            <div class="card-content-front">
                                ${!isGeneral ? `<span class="card-category">${catLabel}</span>` : ''}
                                <h3 class="card-headline">${oneLiner || item.title}</h3>
                                <div class="card-meta">
                                    <div style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
                                        <div class="card-meta-left" style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap; max-width: 70%;">
                                            <span>${timeStr}</span>
                                        </div>
                                        <span style="font-size: 0.7rem; color: var(--primary); font-weight: 800; letter-spacing: 0.05em;">${I18N[currentLang].details.toUpperCase()}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="card-back">
                            <div class="card-back-title">${item.title}</div>
                            <ul class="card-back-bullets">
                                ${bullets || `<li>${I18N[currentLang].noSummary}</li>`}
                            </ul>
                            <div style="margin-top: auto;">
                                <a href="${item.fetch_url || item.source_url}" target="_blank" class="btn-action" style="text-decoration: none; display: flex; align-items: center; justify-content: center;" onclick="event.stopPropagation()">
                                    ${I18N[currentLang].source}
                                </a>
                                <button class="btn-secondary" onclick="event.stopPropagation(); toggleFlip('${item.id}')">
                                    ${I18N[currentLang].back}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
          }).join("");
          
          if (append) {
              container.insertAdjacentHTML('beforeend', html);
          } else {
              container.innerHTML = html;
          }
          
          items.forEach(item => { const el = document.getElementById(`item-${item.id}`); if (el) observer.observe(el); });
      }

      function toggleFlip(id) {
        const el = document.getElementById(`item-${id}`);
        if (el) { el.classList.toggle("flipped"); haptic("impactLight"); }
      }

      function parseSummary(s, lang = "en") {
        if (!s) return { oneLiner: "", bullets: "" };
        try {
          const d = typeof s === 'string' && s.startsWith("{") ? JSON.parse(s) : s;
          if (typeof d === 'object') {
            const isHi = lang === "hi";
            const qt = isHi ? d.quick_take_hindi || d.quick_take : d.quick_take;
            const kd = isHi ? d.key_details_hindi || d.key_details : d.key_details;
            return { oneLiner: qt || "", bullets: (kd || []).map((l) => `<li>${l}</li>`).join("") };
          }
        } catch (e) {}
        const lines = typeof s === 'string' ? s.split("\n").filter((l) => l.trim()) : [];
        return { oneLiner: lines[0] || "", bullets: lines.slice(1).map((l) => `<li>${l}</li>`).join("") };
      }

      function resetAndFetch() { haptic("impactLight"); fetchFeed(true); }

      function initPullToRefresh() {
        const container = document.getElementById("feed-container");
        const indicator = document.getElementById("pull-indicator");
        if (!container || !indicator) return;
        let startY = 0;
        container.addEventListener("touchstart", (e) => {
          if (container.scrollTop <= 5) startY = e.touches[0].pageY;
        }, { passive: true });
        container.addEventListener("touchmove", (e) => {
          if (startY > 0) {
            const diff = e.touches[0].pageY - startY;
            if (diff > 0 && diff < 120) {
              indicator.style.opacity = Math.min(diff / 80, 1);
              indicator.style.transform = `translateY(${diff}px) rotate(${diff*3}deg)`;
            }
          }
        }, { passive: true });
        container.addEventListener("touchend", (e) => {
          const transform = indicator.style.transform;
          const match = transform ? transform.match(/translateY\((\d+\.?\d*)px\)/) : null;
          const diff = match ? parseFloat(match[1]) : 0;
          if (diff > 70) {
            haptic("notificationSuccess");
            resetAndFetch();
          }
          indicator.style.transform = "translateY(0)";
          indicator.style.opacity = "0";
          startY = 0;
        });
      }

      init();
    </script>
  </body>
</html>
